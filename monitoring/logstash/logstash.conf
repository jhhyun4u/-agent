# ════════════════════════════════════════════════════════════════════════════
# INPUT - 로그 수집
# ════════════════════════════════════════════════════════════════════════════

input {
  # TCP를 통한 로그 수집 (애플리케이션에서 직접 전송)
  tcp {
    port => 5000
    codec => json
    tags => ["direct_input"]
  }

  # UDP를 통한 로그 수집 (syslog 형식)
  udp {
    port => 5000
    tags => ["syslog"]
  }

  # Filebeat로부터 수집
  beats {
    port => 5044
    tags => ["filebeat"]
  }

  # 파일로부터 직접 수집 (개발 환경)
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/tmp/sincedb_app_logs"
    tags => ["app_logs"]
  }

  # 백엔드 로그
  file {
    path => "/var/log/app/backend/*.log"
    start_position => "beginning"
    sincedb_path => "/tmp/sincedb_backend_logs"
    tags => ["backend_logs"]
  }

  # 프론트엔드 로그
  file {
    path => "/var/log/app/frontend/*.log"
    start_position => "beginning"
    sincedb_path => "/tmp/sincedb_frontend_logs"
    tags => ["frontend_logs"]
  }

  # Docker 컨테이너 로그
  file {
    path => "/var/log/docker/*.log"
    start_position => "beginning"
    sincedb_path => "/tmp/sincedb_docker_logs"
    codec => json
    tags => ["docker_logs"]
  }
}

# ════════════════════════════════════════════════════════════════════════════
# FILTER - 로그 처리 및 파싱
# ════════════════════════════════════════════════════════════════════════════

filter {
  # JSON 파싱
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # FastAPI 백엔드 로그 파싱
  if "backend_logs" in [tags] {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:timestamp} - %{LOGLEVEL:level} - %{GREEDYDATA:message}'
      }
      add_field => { "component" => "backend" }
    }
  }

  # 프론트엔드 로그 파싱
  if "frontend_logs" in [tags] {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{GREEDYDATA:message}'
      }
      add_field => { "component" => "frontend" }
    }
  }

  # HTTP 요청 로그 파싱
  if [message] =~ /GET|POST|PUT|DELETE|PATCH/ {
    grok {
      match => {
        "message" => '%{IP:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{DATA:path} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code} %{NUMBER:bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
      add_field => { "type" => "http" }
    }
  }

  # 에러 로그 분류
  if [level] =~ /ERROR|CRITICAL/ {
    mutate {
      add_field => { "severity" => "error" }
    }
  } else if [level] =~ /WARN/ {
    mutate {
      add_field => { "severity" => "warning" }
    }
  } else {
    mutate {
      add_field => { "severity" => "info" }
    }
  }

  # 타임스탐프 정규화
  date {
    match => ["timestamp", "ISO8601", "dd/MMM/yyyy:HH:mm:ss Z"]
    target => "@timestamp"
  }

  # 추가 필드 제거
  mutate {
    remove_field => ["@version"]
  }

  # 민감 정보 제거 (API 키, 토큰 등)
  mutate {
    gsub => [
      "message", "(api[_-]?key|token|password|secret|credential)['\"]?\s*[:=]\s*['\"]?[^\s'\"]+['\"]?", "\1=***REDACTED***",
      "message", "(Authorization|X-API-Key)['\"]?\s*[:=]\s*['\"]?Bearer\s+[^\s'\"]+['\"]?", "\1=***REDACTED***"
    ]
  }
}

# ════════════════════════════════════════════════════════════════════════════
# OUTPUT - Elasticsearch 전송
# ════════════════════════════════════════════════════════════════════════════

output {
  # Elasticsearch로 전송
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }

  # 콘솔에도 출력 (디버깅용)
  stdout {
    codec => rubydebug
  }

  # 에러 로그는 별도로 저장
  if [severity] == "error" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "errors-%{+YYYY.MM.dd}"
    }
  }

  # 성능 지표는 별도 인덱스
  if [type] == "http" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "http-metrics-%{+YYYY.MM.dd}"
    }
  }
}
