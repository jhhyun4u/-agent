name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Frontend-only deployment
  # Vercel은 GitHub 연동으로 자동 배포 (별도 job 불필요)
  # frontend/ 디렉토리를 Vercel 프로젝트 루트로 설정하면 자동 배포됨
  frontend-deployment:
    name: Frontend Auto-Deploy (Vercel)
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Frontend deployment via Vercel
        run: |
          echo "✅ Frontend deployment configuration:"
          echo "   - Vercel GitHub integration active"
          echo "   - Root directory: frontend/"
          echo "   - Auto-deploy on push to main"
          echo ""
          echo "Vercel will automatically deploy the frontend when changes are pushed."
