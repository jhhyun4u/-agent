name: G2B 공고 모니터링 E2E 테스트

# 트리거
on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'frontend/e2e/**'
      - '.github/workflows/e2e-test.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    # 매일 오전 9시에 스테이징 환경 테스트 실행 (한국 시간)
    - cron: '0 0 * * *'  # UTC 기준 자정 (한국시간 오전 9시)
  workflow_dispatch:  # 수동 실행 가능

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. 백엔드 Live 테스트
  # ─────────────────────────────────────────

  backend-e2e-tests:
    name: 백엔드 E2E 테스트 (Stag 환경)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: 백엔드 Live 테스트 (모니터링)
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_TEAM_ID: ${{ secrets.E2E_TEAM_ID }}
          E2E_BID_NO: ${{ secrets.E2E_BID_NO }}
        run: |
          pytest tests/integration/live/test_g2b_monitoring.py \
            -m live -v --timeout=120 --tb=short \
            --junitxml=junit/test-results-monitoring.xml \
            --html=junit/report-monitoring.html --self-contained-html

      - name: 백엔드 Live 테스트 (워크플로우)
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_TEAM_ID: ${{ secrets.E2E_TEAM_ID }}
          E2E_BID_NO: ${{ secrets.E2E_BID_NO }}
        run: |
          pytest tests/integration/test_bid_to_proposal_workflow.py \
            -m live -v --timeout=120 --tb=short \
            --junitxml=junit/test-results-workflow.xml \
            --html=junit/report-workflow.html --self-contained-html

      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-results
          path: junit/
          retention-days: 30

      - name: 테스트 결과 리포트
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 백엔드 E2E 테스트 결과
          path: junit/test-results-*.xml
          reporter: java-junit

  # ─────────────────────────────────────────
  # 2. 프론트엔드 E2E 테스트
  # ─────────────────────────────────────────

  frontend-e2e-tests:
    name: 프론트엔드 E2E 테스트 (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Playwright 브라우저 설치
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 인증 설정
        working-directory: frontend
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npx playwright test e2e/auth.setup.ts

      - name: Playwright E2E 테스트 실행
        working-directory: frontend
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          npx playwright test e2e/bid-monitoring-flow.spec.ts \
            --reporter=html,junit

      - name: Playwright 보고서 업로드
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: JUnit 결과 업로드
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 30

      - name: 테스트 결과 리포트
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 프론트엔드 E2E 테스트 결과
          path: frontend/test-results/junit.xml
          reporter: java-junit

  # ─────────────────────────────────────────
  # 3. 테스트 통합 & 알림
  # ─────────────────────────────────────────

  test-summary:
    name: 테스트 결과 통합
    needs: [backend-e2e-tests, frontend-e2e-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 테스트 결과 다운로드
        uses: actions/download-artifact@v3

      - name: 통합 결과 분석
        run: |
          echo "## 📊 E2E 테스트 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend-e2e-tests.result }}" == "success" ]; then
            echo "✅ **백엔드 테스트**: 통과" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **백엔드 테스트**: 실패" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-e2e-tests.result }}" == "success" ]; then
            echo "✅ **프론트엔드 테스트**: 통과" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **프론트엔드 테스트**: 실패" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Slack 알림 (성공)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ G2B E2E 테스트 완료 - 모든 테스트 통과!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *G2B 공고 모니터링 E2E 테스트 완료*\n\n모든 테스트가 통과했습니다! 🎉"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status*\n✅ PASSED"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "상세 결과"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 알림 (실패)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ G2B E2E 테스트 실패",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *G2B 공고 모니터링 E2E 테스트 실패*\n\n일부 테스트가 실패했습니다. 확인해주세요."
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Backend*\n${{ needs.backend-e2e-tests.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Frontend*\n${{ needs.frontend-e2e-tests.result }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "상세 결과"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 테스트 결과 확인
        if: failure()
        run: |
          echo "❌ 일부 테스트가 실패했습니다"
          echo "GitHub Actions 로그를 확인해주세요: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
