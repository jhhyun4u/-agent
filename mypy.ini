[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = False
show_error_codes = True

# Suppress import-untyped errors for known third-party libraries without stubs
[mypy-lxml.*]
ignore_missing_imports = True

[mypy-pptx.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-python_pptx.*]
ignore_missing_imports = True

[mypy-olefile.*]
ignore_missing_imports = True

[mypy-openpyxl.*]
ignore_missing_imports = True

[mypy-croniter.*]
ignore_missing_imports = True

[mypy-hwpx.*]
ignore_missing_imports = True

[mypy-hwpxskill.*]
ignore_missing_imports = True
